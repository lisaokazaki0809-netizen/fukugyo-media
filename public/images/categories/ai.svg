<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5F3FF"/>
      <stop offset="100%" style="stop-color:#EDE9FE"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <!-- Brain/Circuit -->
  <circle cx="400" cy="180" r="80" fill="none" stroke="#7C3AED" stroke-width="2.5" opacity="0.3"/>
  <circle cx="400" cy="180" r="55" fill="none" stroke="#7C3AED" stroke-width="2" opacity="0.5"/>
  <circle cx="400" cy="180" r="30" fill="#7C3AED" opacity="0.15"/>
  <!-- Nodes -->
  <circle cx="330" cy="130" r="8" fill="#7C3AED" opacity="0.6"/>
  <circle cx="470" cy="130" r="8" fill="#7C3AED" opacity="0.6"/>
  <circle cx="330" cy="230" r="8" fill="#7C3AED" opacity="0.6"/>
  <circle cx="470" cy="230" r="8" fill="#7C3AED" opacity="0.6"/>
  <circle cx="310" cy="180" r="6" fill="#7C3AED" opacity="0.4"/>
  <circle cx="490" cy="180" r="6" fill="#7C3AED" opacity="0.4"/>
  <circle cx="400" cy="100" r="6" fill="#7C3AED" opacity="0.4"/>
  <circle cx="400" cy="260" r="6" fill="#7C3AED" opacity="0.4"/>
  <!-- Connections -->
  <line x1="330" y1="130" x2="400" y2="180" stroke="#7C3AED" stroke-width="1.5" opacity="0.3"/>
  <line x1="470" y1="130" x2="400" y2="180" stroke="#7C3AED" stroke-width="1.5" opacity="0.3"/>
  <line x1="330" y1="230" x2="400" y2="180" stroke="#7C3AED" stroke-width="1.5" opacity="0.3"/>
  <line x1="470" y1="230" x2="400" y2="180" stroke="#7C3AED" stroke-width="1.5" opacity="0.3"/>
  <line x1="310" y1="180" x2="400" y2="180" stroke="#7C3AED" stroke-width="1.5" opacity="0.3"/>
  <line x1="490" y1="180" x2="400" y2="180" stroke="#7C3AED" stroke-width="1.5" opacity="0.3"/>
  <!-- Chat bubbles -->
  <rect x="530" y="120" width="140" height="40" rx="20" fill="#7C3AED" opacity="0.12"/>
  <rect x="550" y="130" width="12" height="4" rx="2" fill="#7C3AED" opacity="0.4"/>
  <rect x="568" y="130" width="30" height="4" rx="2" fill="#7C3AED" opacity="0.4"/>
  <rect x="550" y="140" width="45" height="4" rx="2" fill="#7C3AED" opacity="0.3"/>
  <rect x="140" y="200" width="120" height="40" rx="20" fill="#7C3AED" opacity="0.12"/>
  <rect x="158" y="210" width="30" height="4" rx="2" fill="#7C3AED" opacity="0.4"/>
  <rect x="158" y="220" width="20" height="4" rx="2" fill="#7C3AED" opacity="0.3"/>
  <!-- Sparkle -->
  <text x="400" y="188" text-anchor="middle" font-size="24" fill="#7C3AED" opacity="0.7" font-family="system-ui">AI</text>
</svg>
