<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ECFDF5"/>
      <stop offset="100%" style="stop-color:#D1FAE5"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <!-- Rocket -->
  <g transform="translate(380, 100) rotate(15)">
    <ellipse cx="0" cy="60" rx="22" ry="65" fill="#059669" opacity="0.2"/>
    <ellipse cx="0" cy="60" rx="15" ry="50" fill="#059669" opacity="0.35"/>
    <!-- Window -->
    <circle cx="0" cy="40" r="8" fill="#059669" opacity="0.5"/>
    <!-- Flames -->
    <ellipse cx="0" cy="130" rx="10" ry="20" fill="#F59E0B" opacity="0.3"/>
    <ellipse cx="0" cy="125" rx="6" ry="14" fill="#F59E0B" opacity="0.5"/>
    <!-- Fins -->
    <path d="M-15 90 L-30 120 L-15 110 Z" fill="#059669" opacity="0.25"/>
    <path d="M15 90 L30 120 L15 110 Z" fill="#059669" opacity="0.25"/>
  </g>
  <!-- Stars/sparks -->
  <circle cx="300" cy="140" r="3" fill="#059669" opacity="0.4"/>
  <circle cx="520" cy="100" r="2" fill="#059669" opacity="0.3"/>
  <circle cx="280" cy="200" r="2.5" fill="#059669" opacity="0.35"/>
  <circle cx="540" cy="180" r="3" fill="#059669" opacity="0.3"/>
  <circle cx="250" cy="260" r="2" fill="#059669" opacity="0.2"/>
  <circle cx="560" cy="250" r="2" fill="#059669" opacity="0.2"/>
  <!-- Growth path -->
  <path d="M200 300 Q300 280 350 250 Q400 220 450 200 Q500 180 550 130" stroke="#059669" stroke-width="2" fill="none" opacity="0.2" stroke-dasharray="6 4"/>
</svg>
