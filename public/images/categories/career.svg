<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFBEB"/>
      <stop offset="100%" style="stop-color:#FEF3C7"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <!-- Steps/stairs -->
  <rect x="200" y="280" width="80" height="30" rx="4" fill="#D97706" opacity="0.15"/>
  <rect x="300" y="240" width="80" height="70" rx="4" fill="#D97706" opacity="0.2"/>
  <rect x="400" y="200" width="80" height="110" rx="4" fill="#D97706" opacity="0.28"/>
  <rect x="500" y="160" width="80" height="150" rx="4" fill="#D97706" opacity="0.35"/>
  <!-- Flag at top -->
  <line x1="540" y1="100" x2="540" y2="160" stroke="#D97706" stroke-width="2.5" opacity="0.5"/>
  <path d="M542 100 L570 112 L542 124 Z" fill="#D97706" opacity="0.4"/>
  <!-- Person climbing -->
  <circle cx="440" cy="182" r="10" fill="#D97706" opacity="0.3"/>
  <line x1="440" y1="192" x2="440" y2="210" stroke="#D97706" stroke-width="2" opacity="0.3"/>
  <line x1="435" y1="200" x2="445" y2="200" stroke="#D97706" stroke-width="2" opacity="0.3"/>
  <!-- Star/badge -->
  <circle cx="640" cy="140" r="28" fill="#D97706" opacity="0.1"/>
  <circle cx="640" cy="140" r="18" fill="#D97706" opacity="0.15"/>
  <text x="640" y="147" text-anchor="middle" font-size="18" fill="#D97706" opacity="0.5" font-family="system-ui">&#9733;</text>
  <!-- Skill dots -->
  <circle cx="180" cy="150" r="5" fill="#D97706" opacity="0.15"/>
  <circle cx="200" cy="135" r="7" fill="#D97706" opacity="0.2"/>
  <circle cx="225" cy="145" r="4" fill="#D97706" opacity="0.12"/>
</svg>
